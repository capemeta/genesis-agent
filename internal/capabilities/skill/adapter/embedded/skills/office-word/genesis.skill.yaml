schema: genesis.skill/v1
skill: office-word
runtime_profiles:
  read:
    sandbox: {execution_mode: per_call, backends: [remote_sandbox, local_platform_sandbox, local_host]}
    dependencies:
      runtime:
        python: [{name: markitdown, import: markitdown}]
  work:
    sandbox: {execution_mode: sandboxed_session, backends: [remote_sandbox, local_platform_sandbox, local_host]}
    dependencies:
      runtime:
        python:
          - {name: defusedxml, import: defusedxml}
          - {name: lxml, import: lxml}
        node: [{name: docx, require: docx}]
        system:
          - {name: pandoc, command: pandoc}
          - {name: libreoffice, command: soffice}
          - {name: poppler, command: pdftoppm}
invocations:
  - id: read
    handle: office-word-read
    description: 提取并总结已有 Word 文档的文字和表格，不渲染、不编辑
    agent_mode: {mode: fork}
    runtime_profile: read
    request:
      task: {required: false}
      inputs:
        min_items: 1
        max_items: 1
        access: read_only
        accepted_suffixes: [.docx, .doc]
    prompt: {instructions: references/invocations/read.md, skill_body: omit}
    tool_policy:
      allow: [run_skill_command, install_skill_dependencies]
      required: [run_skill_command]

    result: {kind: message}
  - id: work
    handle: office-word
    description: 创建、编辑、转换、渲染或版式检查 Word 文档
    agent_mode: {mode: fork}
    runtime_profile: work
    request:
      task: {required: true}
      inputs:
        min_items: 0
        max_items: 16
        access: read_only
        accepted_suffixes: [.docx, .doc, .md, .txt, .pdf]
    prompt: {instructions: references/invocations/work.md, skill_body: include}
    tool_policy:
      allow: [list_skill_resources, read_skill_resource, search_skill_resources, run_skill_command, install_skill_dependencies, read_file, write_file, edit_file, view_image, select_deliverable_candidate]
      required: [run_skill_command, write_file, select_deliverable_candidate]
    result:
      kind: deliverables
      deliverables:
        - id: document
          role: primary
          required: true
          cardinality: exactly_one
          accepted_suffixes: [.docx]
          accepted_mimes: [application/vnd.openxmlformats-officedocument.wordprocessingml.document]
          delivery_policy: run-output
