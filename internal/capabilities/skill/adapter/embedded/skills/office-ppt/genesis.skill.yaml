schema: genesis.skill/v1
skill: office-ppt

runtime_profiles:
  read:
    sandbox:
      execution_mode: per_call
      backends:
        - remote_sandbox
        - local_platform_sandbox
        - local_host
    dependencies:
      runtime:
        python:
          - name: markitdown
            import: markitdown
  work:
    sandbox:
      execution_mode: sandboxed_session
      backends:
        - remote_sandbox
        - local_platform_sandbox
        - local_host
    dependencies:
      runtime:
        python:
          - name: markitdown
            import: markitdown
          - name: Pillow
            import: PIL
          - name: defusedxml
            import: defusedxml
        node:
          - name: pptxgenjs
            require: pptxgenjs
        system:
          - name: libreoffice
            command: soffice
          - name: poppler
            command: pdftoppm

invocations:
  - id: read
    handle: office-ppt-read
    description: 仅用于 PPTX 内容、表格与结构的只读提取与摘要。严禁在此模式下尝试解包、修改 XML 或重新打包 PPTX 文件！如需修改、重色或重新生成 PPTX，必须调用 Skill(skill="office-ppt", task="...") 触发子智能体执行。
    agent_mode:
      mode: fork
    runtime_profile: read
    request:
      task:
        required: false
      inputs:
        min_items: 1
        max_items: 1
        access: read_only
        accepted_suffixes: [.pptx]
        accepted_mimes:
          - application/vnd.openxmlformats-officedocument.presentationml.presentation
    prompt:
      instructions: references/invocations/read.md
      skill_body: omit
    tool_policy:
      allow:
        - run_skill_command
        - install_skill_dependencies
      required:
        - run_skill_command

    result:
      kind: message

  - id: work
    handle: office-ppt
    description: 创建、编辑、渲染或视觉检查 PPT；不要用于只读提取或摘要
    agent_mode:
      mode: fork
    runtime_profile: work
    request:
      task:
        required: true
      inputs:
        min_items: 0
        max_items: 16
        access: read_only
        accepted_suffixes: [.md, .txt, .pptx, .docx, .xlsx, .pdf]
    prompt:
      instructions: references/invocations/work.md
      skill_body: include
    tool_policy:
      allow:
        - list_skill_resources
        - read_skill_resource
        - search_skill_resources
        - run_skill_command
        - install_skill_dependencies
        - read_file
        - write_file
        - edit_file
        - view_image
        - select_deliverable_candidate
      required:
        - run_skill_command
        - write_file
        - select_deliverable_candidate
    result:
      kind: deliverables
      deliverables:
        - id: deck
          role: primary
          required: true
          cardinality: exactly_one
          accepted_suffixes: [.pptx]
          accepted_mimes:
            - application/vnd.openxmlformats-officedocument.presentationml.presentation
          delivery_policy: run-output
          qa:
            policy: visual-qa/v1
            enforcement: optional
