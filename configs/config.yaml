# Genesis Agent 全局默认配置
# 此文件提交到版本库，不应包含密钥
# 密钥请写在 configs/config.local.yaml（已 gitignore）或通过环境变量注入
# LLM、MCP、Hook 默认配置分别位于 llm.yaml、mcp.yaml、hooks.yaml

http_client:
  default_timeout: 30s
  sse_idle_timeout: 0s
  response_header_timeout: 15s
  tls_handshake_timeout: 10s
  idle_conn_timeout: 90s
  max_idle_conns: 100
  max_idle_conns_per_host: 10
  max_response_body_bytes: 4194304
  max_request_body_bytes: 4194304
  max_error_body_bytes: 4096
  user_agent: genesis-agent/httpclient
  request_id_header: X-Request-ID
  retry:
    max_attempts: 3
    initial_backoff: 200ms
    max_backoff: 2s
    multiplier: 2.0
    jitter: true

secrets:
  # 本地开发阶段的密钥与连接配置文件目录；不应提交其中的数据文件。
  data_dir: data
  # 主密钥只读取环境变量值，不写入配置文件。
  master_key_env: GENESIS_MASTER_KEY

sandbox:
  # 本地 OS 平台沙箱配置 (Process Confinement: Seatbelt/bwrap/Windows Token)
  local:
    enabled: true
    preference: auto         # auto (默认,优先使用可降级) | required (强隔离) | disabled
    default_level: process_constrained

  # 远程容器沙箱配置 (genesis-sandbox API / Docker Service)
  remote:
    enabled: true            # Layer 1 硬门控开关：未开启时禁止任何远程调度
    base_url: ${GENESIS_SANDBOX_BASE_URL}
    api_key: ${GENESIS_SANDBOX_API_KEY}
    api_key_env: GENESIS_SANDBOX_API_KEY
    workspace_id: ""
    default_runtime_profile: code-polyglot-basic

  # 全局路由与调度配置
  routing:
    default_execution: optional       # disabled | optional | required
    allow_session_override: true      # 允许每次对话或 HTTP run 请求覆盖 sandbox 策略
    auto_route_risk: true             # 允许 CommandRiskEvaluator 自动按风险切分远程沙箱

  # 外置技能沙箱集中覆盖 (skills_override)
  skills_override:
    office-ppt:
      sandbox:
        preferred_backend: remote_sandbox
        allow_degradation: true


policy:
  # 权限许可模式 PermissionMode
  # agent: 工作区写免审批，命令/联网/Skill脚本需确认
  # workspace_auto: 工作区值守——工作区内+联网免确认；区外写/装外部Skill/敏感路径硬拒绝（不弹窗）
  # full_access: 免审批全放行（仍硬拒 critical）；protected_write/read_only/plan 见文档
  # 可选: plan | read_only | protected_write | agent | workspace_auto | full_access
  permission_mode: workspace_auto
  defaults:
    unknown: ask
    dangerous: ask
    critical: deny
    deny_overrides_allow: true
    allowed_grant_scopes: [once, turn, session, project]
  files:
    default: ask
    workspace:
      read: allow
      list: allow
      walk: allow
      write: allow
      edit: allow
      delete: ask
    external:
      read: ask
      list: ask
      walk: ask
      write: ask
      edit: ask
      delete: deny
    protected:
      default: deny
    workspace_metadata:
      write: deny
      paths: [.git, .agents, .codex]
  # commands/web/sandbox 第一批仅解析默认值，运行时治理在对应 matcher 接入后生效。
  commands:
    default: ask
  web:
    search:
      default: ask
    fetch:
      default: ask
  sandbox:
    default_mode: disabled

web:
  # 网络搜索 provider 密钥。默认用普通环境变量占位，适合 start.local.bat / CI 注入；
  # 也可以在 configs/config.local.yaml 或 ~/.genesis-agent/<product>/config.yaml 中覆盖。
  brave_api_key: ${BRAVE_SEARCH_API_KEY}
  searxng_base_url: ${SEARXNG_BASE_URL}
  tavily_api_key: ${TAVILY_API_KEY}
  exa_api_key: ${EXA_API_KEY}
  serpapi_api_key: ${SERPAPI_API_KEY}

skills:
  # 本地 Skill 默认会扫描：
  # - 当前工作目录 .genesis/skills
  # - configs/skills
  # - ~/.genesis-agent/cli/skills
  # 额外目录可在 config.local.yaml 或 ~/.genesis-agent/cli/config.yaml 中配置。
  # 远程 Skill 安装来源（install_skill_from_source / genesis skill install <url>）
  install:
    # forge（/tree|/blob）与下载站（如 openskills API zip）共用白名单；默认仅 github.com。
    # 下载时重定向目标也须在此列表（或与首跳同主机）。详见 docs/Skills设计.md §3.4.2。
    allowed_hosts:
      - github.com
      - openskills.cc
    # 是否允许 dir:/file: 本地安装；省略默认 true
    # allow_local: true
agent:
  # ReAct Loop 最大迭代次数（防止无限循环）
  max_iterations: 50

  # Repeat Guard（同调用身份硬闸 + 无进展门禁）；省略时启用默认值
  # repeat_guard_enabled: true
  # max_identical_tool_failures: 2   # 同 call_key 失败 2 次后，第 3 次拦截；0=关闭 L1
  # max_stagnant_iterations: 5       # 连续无进展达阈值触发 no_progress；0=关闭 L2
  # max_consecutive_fail: 0          # 任意工具连续失败上限；0=关闭

  # 并发上限（省略则用代码/产品默认；取消注释即可覆盖）
  # tool_max_concurrency: 4           # 同轮 sibling 工具并发（ConcurrencySafe=true）；默认 4
  # subagent_max_concurrent: 3         # 根会话子智能体并发槽；默认 CLI/Enterprise=3、Desktop=4
  # vision_max_concurrent_reads: 3     # 视觉读图并发；默认 3

  # Agent 系统提示词（可在 config.local.yaml 中覆盖为业务专属提示词）
  system_prompt: "你是一个有帮助、有能力的AI助手。善用提供的工具来准确回答用户的问题。回答时请简洁清晰，直接给出答案。"

log:
  # 日志级别: debug | info | warn | error（作用于 agent 通道）
  level: info

  # 三类日志根目录（相对路径相对配置目录父目录）；默认 .genesis/logs
  dir: .genesis/logs

  # 兼容旧配置：若仅设置 path 指向 .../agent.log，将推导 dir 与 agent 文件名
  # path: ""

  rotate:
    daily: true
    max_size_mb: 100
    retain_days: 14
    compress: false

  channels:
    agent:
      enabled: true
      file: agent.log
      format: text            # text | json
      retain_days: 14
    audit:
      enabled: true
      file: audit.log
      format: jsonl
      retain_days: 90
    usage:
      enabled: true
      file: usage.log
      format: jsonl
      retain_days: 90

server:
  # HTTP 服务监听地址
  host: "0.0.0.0"
  port: 8080
