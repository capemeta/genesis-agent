# Genesis Agent 默认配置
# 此文件提交到版本库，不应包含密钥
# 密钥请写在 configs/config.local.yaml（已 gitignore）或通过环境变量注入

llm:
  # 全局默认请求超时；Provider 可单独覆盖
  timeout: 60s

  # Provider 层：endpoint 与认证只配置一次
  providers:
    qwen:
      type: openai
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      timeout: 60s
      auth:
        type: api_key
        api_key: ${QWEN_API_KEY}

    openai:
      type: openai
      base_url: https://api.openai.com/v1
      timeout: 60s
      auth:
        type: api_key
        api_key: ${OPENAI_API_KEY}

    deepseek:
      type: openai
      base_url: https://api.deepseek.com/v1
      timeout: 60s
      auth:
        type: api_key
        api_key: ${DEEPSEEK_API_KEY}

    claude:
      type: anthropic
      base_url: https://api.anthropic.com
      timeout: 60s
      auth:
        type: api_key
        api_key: ${CLAUDE_API_KEY}

    ollama:
      type: ollama
      base_url: http://localhost:11434
      timeout: 120s
      auth:
        type: none

    ark:
      type: ark
      base_url: ""
      timeout: 60s
      auth:
        type: api_key
        api_key: ${ARK_API_KEY}
        access_key: ${ARK_ACCESS_KEY}
        secret_key: ${ARK_SECRET_KEY}

    azure_openai:
      type: openai
      base_url: ${AZURE_OPENAI_BASE_URL}
      api_version: ${AZURE_OPENAI_API_VERSION}
      by_azure: true
      timeout: 60s
      auth:
        type: api_key
        api_key: ${AZURE_OPENAI_API_KEY}

  # Model Pool：业务只选择模型别名，不重复写 endpoint/key
  models:
    fast:
      provider: qwen
      model: qwen-turbo
      strategy: low_cost
      timeout: 45s
      temperature: 0.2
      max_tokens: 2048
      tool_choice: auto
      supports_tools: true
      tags: [fast, cheap, tool_call]

    default:
      provider: qwen
      model: qwen-plus
      strategy: balanced
      timeout: 90s
      temperature: 0.4
      max_tokens: 4096
      tool_choice: auto
      supports_tools: true
      tags: [chat, default]

    reasoning:
      provider: qwen
      model: qwen-plus
      strategy: high_quality
      timeout: 180s
      temperature: 0.2
      max_tokens: 8192
      tool_choice: auto
      supports_tools: true
      tags: [planning, reasoning]

    coder:
      provider: qwen
      model: deepseek-v4-flash
      strategy: code_quality
      timeout: 240s
      temperature: 0.1
      max_tokens: 8192
      tool_choice: auto
      supports_tools: true
      tags: [coding]

    local:
      provider: ollama
      model: qwen2.5:7b
      strategy: local_private
      timeout: 300s
      temperature: 0.3
      max_tokens: 4096
      supports_tools: false
      tags: [local, offline]

  # 路由规则：不同任务选择不同模型别名
  router:
    default: default
    fallback: default
    tool_call: fast
    chat: default
    coding: coder
    planning: reasoning
    summarization: fast
    embedding: default
    vision: default

http_client:
  default_timeout: 30s
  sse_idle_timeout: 0s
  response_header_timeout: 15s
  tls_handshake_timeout: 10s
  idle_conn_timeout: 90s
  max_idle_conns: 100
  max_idle_conns_per_host: 10
  max_response_body_bytes: 4194304
  max_request_body_bytes: 4194304
  max_error_body_bytes: 4096
  user_agent: genesis-agent/httpclient
  request_id_header: X-Request-ID
  retry:
    max_attempts: 3
    initial_backoff: 200ms
    max_backoff: 2s
    multiplier: 2.0
    jitter: true

secrets:
  # 本地开发阶段的密钥与连接配置文件目录；不应提交其中的数据文件。
  data_dir: data
  # 主密钥只读取环境变量值，不写入配置文件。
  master_key_env: GENESIS_MASTER_KEY

policy:
  defaults:
    unknown: ask
    dangerous: ask
    critical: deny
    deny_overrides_allow: true
    allowed_grant_scopes: [once, turn, session, project]
  files:
    default: ask
    workspace:
      read: allow
      list: allow
      walk: allow
      write: allow
      edit: allow
      delete: ask
    external:
      read: ask
      list: ask
      walk: ask
      write: ask
      edit: ask
      delete: deny
    protected:
      default: deny
    workspace_metadata:
      write: deny
      paths: [.git, .agents, .codex]
  # commands/web/sandbox 第一批仅解析默认值，运行时治理在对应 matcher 接入后生效。
  commands:
    default: ask
  web:
    search:
      default: ask
    fetch:
      default: ask
  sandbox:
    default_mode: disabled

agent:
  # ReAct Loop 最大迭代次数（防止无限循环）
  max_iterations: 10

  # Agent 系统提示词（可在 config.local.yaml 中覆盖为业务专属提示词）
  system_prompt: "你是一个有帮助、有能力的AI助手。善用提供的工具来准确回答用户的问题。回答时请简洁清晰，直接给出答案。"

log:
  # 日志级别: debug | info | warn | error
  level: info

server:
  # HTTP 服务监听地址
  host: "0.0.0.0"
  port: 8080





